<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered image captioning application. Upload images and generate intelligent captions using machine learning.">
    <title>AI Image Captioning</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    <main class="container">
        <header class="header">
            <div>
                <span class="eyebrow">AI Application</span>
                <h1>Image Captioning</h1>
                <p>Upload an image and receive a clear, professional caption generated by the backend model.</p>
            </div>
        </header>

        <section class="upload-panel">
            <label class="file-selector" for="imageInput">
                <input id="imageInput" type="file" accept="image/*" aria-label="Upload image" />
                <span>Select an image</span>
            </label>
            <p id="fileName" class="file-name">No image selected</p>
        </section>

        <section class="preview-panel">
            <img id="previewImage" alt="Selected image preview" />
        </section>

        <section class="action-panel">
            <button id="predictButton" type="button" disabled>
                <span class="button-text">Generate Caption</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </section>

        <section class="result-panel" aria-live="polite" aria-atomic="true">
            <h2>Caption</h2>
            <p id="result">Upload an image and click Generate Caption to begin.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
